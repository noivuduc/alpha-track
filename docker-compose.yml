version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: alphadesk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alphadesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-alphadesk}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alphadesk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: alphadesk_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alphadesk_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
      - ./backend/.env.docker
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # --reload-dir limits file watchers (whole /app mount otherwise balloons open FDs on macOS/Linux)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app

  worker:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    container_name: alphadesk_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/workspace/backend
      - ./pipeline:/workspace/pipeline
    command: arq pipeline_worker.worker.WorkerSettings

  dashboard:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    container_name: alphadesk_dashboard
    restart: unless-stopped
    env_file:
      - ./backend/.env
      - ./backend/.env.docker
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/workspace/backend
      - ./pipeline:/workspace/pipeline
    command: uvicorn pipeline_worker.dashboard.app:app --host 0.0.0.0 --port 9000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alphadesk_frontend
    restart: unless-stopped
    env_file: ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
